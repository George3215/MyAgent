<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EvoScientist Studio</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="brand">
          <div class="brand-core">
            <div class="brand-mark" aria-hidden="true">ES</div>
            <div class="brand-text">
              <div class="brand-name">EvoScientist</div>
              <div class="brand-subtitle">Studio</div>
            </div>
          </div>
          <button class="sidebar-toggle icon-button panel-toggle" id="toggleSidebar" type="button" aria-label="Collapse navigation" title="Collapse navigation">‹</button>
        </div>

        <nav class="nav-list" id="navList">
          <button class="nav-item active" data-view="chat" title="工作区">
            <span class="nav-icon">01</span><span>工作台</span>
          </button>
          <button class="nav-item" data-view="experiments" title="实验看板">
            <span class="nav-icon">02</span><span>实验</span>
          </button>
          <button class="nav-item" data-view="install" title="安装引导">
            <span class="nav-icon">03</span><span>安装/模型</span>
          </button>
          <button class="nav-item" data-view="analytics" title="数据可视化">
            <span class="nav-icon">04</span><span>数据</span>
          </button>
          <button class="nav-item" data-view="permissions" title="授权中心">
            <span class="nav-icon">05</span><span>安全</span>
          </button>
        </nav>

        <section class="session-list" id="sessionList" aria-label="Recent sessions">
          <div class="section-heading">最近会话</div>
          <button class="session-item selected" type="button">
            <span class="status-dot paused"></span>
            <span><strong>正在连接</strong><small>等待 studio-api</small></span>
          </button>
        </section>

        <div class="sidebar-footer">
          <span class="health-pill" id="footerClaudeStatus">CLAUDE --</span>
          <span class="health-pill" id="footerSecurityStatus">SAFE --</span>
        </div>
      </aside>

      <main class="main-area">
        <header class="topbar">
          <div>
            <div class="page-kicker" id="viewKicker">Managed Gateway</div>
            <h1 id="viewTitle">科研工作区</h1>
          </div>
          <div class="topbar-actions">
            <button class="icon-button panel-toggle" id="toggleInspector" title="Collapse status panel" aria-label="Collapse status panel">›</button>
            <button class="icon-button" id="refreshQuota" title="刷新后端状态">刷新</button>
            <button class="primary-button" id="runDemo">新任务</button>
          </div>
        </header>

        <section id="viewHost" class="view-host"></section>
      </main>

      <aside class="inspector" aria-label="Task inspector">
        <section class="panel quota-panel" data-inspector-panel="quota">
          <div class="panel-header">
            <h2>额度</h2>
            <div class="panel-actions">
              <span class="panel-badge">--</span>
              <button class="icon-button inline-toggle" data-panel-toggle="quota" type="button" title="Close" aria-label="Close">⌄</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="quota-number"><span id="quotaRemain">--</span><small> credits</small></div>
            <div class="meter" aria-label="Quota usage">
              <span id="quotaMeter" style="width: 0%"></span>
            </div>
            <div class="metric-grid">
              <div><strong id="todayCost">--</strong><span>今日用量</span></div>
              <div><strong id="planName">--</strong><span>套餐</span></div>
              <div><strong id="runCost">--</strong><span>本任务</span></div>
              <div><strong id="serviceStatus">暂未连接</strong><span>服务状态</span></div>
            </div>
          </div>
        </section>

        <section class="panel" data-inspector-panel="core">
          <div class="panel-header">
            <h2>EvoScientist Core</h2>
            <div class="panel-actions">
              <span class="panel-badge" id="coreStateBadge">暂未接收</span>
              <button class="icon-button inline-toggle" data-panel-toggle="core" type="button" title="Close" aria-label="Close">⌄</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="integration-mini">
              <strong>保留原版运行时</strong>
              <span>Studio 通过本地 studio-api 调用 EvoScientist，不改写 upstream 项目。</span>
            </div>
          </div>
        </section>

        <section class="panel" data-inspector-panel="task">
          <div class="panel-header">
            <h2>当前任务</h2>
            <div class="panel-actions">
              <span class="panel-badge" id="taskState">暂未接收</span>
              <button class="icon-button inline-toggle" data-panel-toggle="task" type="button" title="Close" aria-label="Close">⌄</button>
            </div>
          </div>
          <div class="panel-body">
            <ol class="task-steps" id="taskSteps"></ol>
          </div>
        </section>

        <section class="panel" data-inspector-panel="experiment">
          <div class="panel-header">
            <h2>实验进度</h2>
            <div class="panel-actions">
              <span class="panel-badge" id="experimentRunBadge">--</span>
              <button class="icon-button inline-toggle" data-panel-toggle="experiment" type="button" title="Close" aria-label="Close">⌄</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="experiment-card compact">
              <div class="experiment-title" id="experimentTitle">暂未接收真实任务</div>
              <div class="experiment-meta" id="experimentMeta">暂未接收</div>
              <div class="meter slim"><span id="experimentMeter" style="width: 0%"></span></div>
            </div>
          </div>
        </section>

        <section class="panel timeline-panel" data-inspector-panel="timeline">
          <div class="panel-header">
            <h2>实时事件</h2>
            <div class="panel-actions">
              <span class="panel-badge">stream</span>
              <button class="icon-button inline-toggle" data-panel-toggle="timeline" type="button" title="Close" aria-label="Close">⌄</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="timeline" id="timeline"></div>
          </div>
        </section>
      </aside>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
